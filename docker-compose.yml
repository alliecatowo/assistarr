# Assistarr Docker Compose — Self-Hosted Configuration
#
# Quick start:
#   cp .env.example .env
#   # Edit .env with your values (AUTH_SECRET, OPENROUTER_API_KEY, etc.)
#   docker compose up -d
#
# With pre-built image (no local build required):
#   ASSISTARR_IMAGE=ghcr.io/alliecatowo/assistarr:latest docker compose up -d
#
# With Redis (resumable AI streams):
#   docker compose --profile redis up -d
#
# Full media stack (Radarr + Sonarr network):
#   docker compose --profile redis --profile media up -d

services:
  # ==========================================
  # Assistarr Application
  # ==========================================
  assistarr:
    image: ${ASSISTARR_IMAGE:-assistarr:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assistarr
    restart: unless-stopped
    ports:
      - "${ASSISTARR_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Injected at runtime — override individual vars in .env
      - DATABASE_URL=postgres://${POSTGRES_USER:-assistarr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-assistarr}
      - REDIS_URL=${REDIS_ENABLED:-false} == "true" && echo "redis://redis:6379" || echo ""
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - assistarr-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      # Traefik reverse proxy labels (optional, enable if using Traefik)
      - "traefik.enable=${TRAEFIK_ENABLED:-false}"
      - "traefik.http.routers.assistarr.rule=Host(`${ASSISTARR_DOMAIN:-assistarr.local}`)"
      - "traefik.http.routers.assistarr.entrypoints=websecure"
      - "traefik.http.routers.assistarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.assistarr.loadbalancer.server.port=3000"

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: assistarr-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-assistarr}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set it in .env}
      - POSTGRES_DB=${POSTGRES_DB:-assistarr}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assistarr-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-assistarr} -d ${POSTGRES_DB:-assistarr}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Do not expose postgres port by default (security)
    # Uncomment if you need external DB access:
    # ports:
    #   - "127.0.0.1:5432:5432"

  # ==========================================
  # Redis (Optional — for resumable AI streams)
  # Enable with: docker compose --profile redis up -d
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: assistarr-redis
    restart: unless-stopped
    profiles:
      - redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - assistarr-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

# ==========================================
# Networks
# ==========================================
networks:
  assistarr-internal:
    driver: bridge
    # Uncomment to connect to an existing media stack network
    # (allows Assistarr to reach Radarr/Sonarr/Jellyfin by container name)
    # external:
    #   name: ${MEDIA_NETWORK:-media-stack}

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
